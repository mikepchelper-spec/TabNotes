name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/build-extension-release.mjs ${GITHUB_REF_NAME#v}
      - uses: softprops/action-gh-release@v2
        with:
          files: store/tabnotes-extension-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}